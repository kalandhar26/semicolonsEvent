global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "order-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["order-service:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "order-service"

  - job_name: "healing-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["healing-service:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "healing-service"

  - job_name: "ai-predictor"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ai-predictor:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
