name: AI Failure Prediction Platform — CI

# ── Triggers ──────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Allow manual run from GitHub Actions UI — great for live demo!
  workflow_dispatch:

# ── Global env ────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aiplatform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ════════════════════════════════════════════════════════════════
  #  JOB 1 — Build & Test Order Service (Spring Boot)
  # ════════════════════════════════════════════════════════════════
  order-service:
    name: Order Service — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aiplatform_test
          POSTGRES_USER: aiplatform
          POSTGRES_PASSWORD: aiplatform123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Order Service
        working-directory: order-service
        run: mvn clean package -DskipTests -q

      - name: Run Unit Tests
        working-directory: order-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/aiplatform_test
          SPRING_DATASOURCE_USERNAME: aiplatform
          SPRING_DATASOURCE_PASSWORD: aiplatform123
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: mvn test -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-results
          path: order-service/target/surefire-reports/

      - name: Build Docker image
        working-directory: order-service
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-order-service:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-order-service:latest .

  # ════════════════════════════════════════════════════════════════
  #  JOB 2 — Build & Test Healing Service (Spring Boot)
  # ════════════════════════════════════════════════════════════════
  healing-service:
    name: Healing Service — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aiplatform_test
          POSTGRES_USER: aiplatform
          POSTGRES_PASSWORD: aiplatform123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Healing Service
        working-directory: healing-service
        run: mvn clean package -DskipTests -q

      - name: Run Unit Tests
        working-directory: healing-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/aiplatform_test
          SPRING_DATASOURCE_USERNAME: aiplatform
          SPRING_DATASOURCE_PASSWORD: aiplatform123
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: mvn test -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-service-test-results
          path: healing-service/target/surefire-reports/

      - name: Build Docker image
        working-directory: healing-service
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-healing-service:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-healing-service:latest .

  # ════════════════════════════════════════════════════════════════
  #  JOB 3 — Build & Test AI Predictor (Python)
  # ════════════════════════════════════════════════════════════════
  ai-predictor:
    name: AI Predictor — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-predictor/requirements.txt

      - name: Install dependencies
        working-directory: ai-predictor
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with flake8
        working-directory: ai-predictor
        run: |
          pip install flake8
          # Stop on syntax errors; warn on style issues
          flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 main.py --count --max-line-length=120 --statistics || true

      - name: Run tests
        working-directory: ai-predictor
        env:
          PROMETHEUS_URL: http://localhost:9090
          ORDER_SERVICE_URL: http://localhost:8081
          HEALING_SERVICE_URL: http://localhost:8082
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"

      - name: Build Docker image
        working-directory: ai-predictor
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-predictor:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-predictor:latest .

  # ════════════════════════════════════════════════════════════════
  #  JOB 4 — Build React Dashboard
  # ════════════════════════════════════════════════════════════════
  dashboard:
    name: Dashboard — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: aipredictordashboard/package-lock.json

      - name: Install dependencies
        working-directory: aipredictordashboard
        run: npm ci

      - name: Lint
        working-directory: aipredictordashboard
        run: npm run lint --if-present || true

      - name: Run tests
        working-directory: aipredictordashboard
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        working-directory: aipredictordashboard
        env:
          REACT_APP_ORDER_SERVICE_URL: http://localhost:8081
          REACT_APP_HEALING_SERVICE_URL: http://localhost:8082
          REACT_APP_AI_PREDICTOR_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: aipredictordashboard/build/
          retention-days: 3

      - name: Build Docker image
        working-directory: aipredictordashboard
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:latest .

  # ════════════════════════════════════════════════════════════════
  #  JOB 5 — Docker Compose Integration Smoke Test
  # ════════════════════════════════════════════════════════════════
  integration-test:
    name: Integration — docker compose smoke test
    runs-on: ubuntu-latest
    needs: [ order-service, healing-service, ai-predictor, dashboard ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create infra directories
        run: |
          mkdir -p infra/postgres infra/prometheus infra/grafana/provisioning
          cp init.sql infra/postgres/init.sql
          cp prometheus.yml infra/prometheus/prometheus.yml

      - name: Start infra only (fast check)
        run: |
          docker compose up -d postgres zookeeper kafka prometheus
          echo "Waiting for infra to be healthy..."
          sleep 30

      - name: Check Prometheus is up
        run: |
          curl -f http://localhost:9090/-/healthy || exit 1
          echo "✓ Prometheus healthy"

      - name: Check Kafka is up
        run: |
          docker compose exec -T kafka \
            kafka-broker-api-versions --bootstrap-server localhost:9092 \
            && echo "✓ Kafka healthy"

      - name: Check Postgres is up
        run: |
          docker compose exec -T postgres \
            pg_isready -U aiplatform -d aiplatform \
            && echo "✓ Postgres healthy"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ════════════════════════════════════════════════════════════════
  #  JOB 6 — Summary (runs last, shown on PR)
  # ════════════════════════════════════════════════════════════════
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ order-service, healing-service, ai-predictor, dashboard, integration-test ]
    if: always()

    steps:
      - name: Print result
        run: |
          echo "================================================"
          echo "  AI Failure Prediction Platform — CI Results"
          echo "================================================"
          echo "  Order Service   : ${{ needs.order-service.result }}"
          echo "  Healing Service : ${{ needs.healing-service.result }}"
          echo "  AI Predictor    : ${{ needs.ai-predictor.result }}"
          echo "  Dashboard       : ${{ needs.dashboard.result }}"
          echo "  Integration     : ${{ needs.integration-test.result }}"
          echo "================================================"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "================================================"