server:
  port: 8080

spring:
  application:
    name: healing-service

  # ── PostgreSQL ────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://postgres:5432/aiplatform
    username: aiplatform
    password: aiplatform123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Kafka ─────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: "1"
      retries: 3
    consumer:
      group-id: healing-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.semicolon.*"

# ── Actuator + Prometheus ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# ── App config ────────────────────────────────────────────────────
app:
  order-service-url: http://order-service:8080
  ai-predictor-url: http://ai-predictor:8000
  healing:
    # Minimum seconds between two healing actions for the same service
    cooldown-seconds: 30
    # Anomaly score must stay below this for auto-close
    recovery-threshold: 0.35
    # How many consecutive healthy polls before circuit closes
    healthy-polls-required: 3
  kafka:
    topic:
      circuit-events: circuit-events
      anomaly-alerts: anomaly-alerts